name: ZN-M2

on:
  schedule:
    - cron: '47 19 * * *'   # Daily at 03:47 CST
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: 'Extra config lines. Separate multiple lines with \n.'
        required: false
        type: string
      TEST:
        description: 'Generate the final config only, without compiling firmware.'
        default: 'false'
        required: false
        type: boolean

permissions: write-all

jobs:
  check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
    - name: Check upstream Passwall version
      id: check
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        LATEST_PW=$(gh release list -R Openwrt-Passwall/openwrt-passwall -L 1 --json tagName -q '.[0].tagName')
        LATEST_TAG=$(gh release list -R ${{ github.repository }} -L 1 --json tagName -q '.[0].tagName' || echo "")
        if [ "$LATEST_PW" != "$LATEST_TAG" ]; then
          echo "Passwall release: ${LATEST_TAG:-none} -> $LATEST_PW"
          echo "should_build=true" >> $GITHUB_OUTPUT
        else
          echo "Up to date ($LATEST_TAG)"
          echo "should_build=false" >> $GITHUB_OUTPUT
        fi

  build:
    needs: check
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.check.outputs.should_build == 'true')
    name: ZN-M2
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_CONFIG: ZN-M2-WIFI-NO
      WRT_THEME: argon
      WRT_NAME: OWRT
      WRT_SSID: OWRT
      WRT_WORD: 12345678
      WRT_IP: 192.168.10.1
      WRT_PW: none
      WRT_REPO: https://github.com/VIKINGYFY/immortalwrt.git
      WRT_BRANCH: main
      WRT_SOURCE: VIKINGYFY/immortalwrt
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      WRT_TEST: ${{inputs.TEST}}
